  <div class="desk">

    <div class="ambient-glow"></div>

    <main class="parchment">

      <section class="content">

          You open the page like a worn notebook left too close to candlelight.

          Everything here is still, except the words.
        </p>
      </section>

      <nav class="links">
        <a href="#">Archive</a>
